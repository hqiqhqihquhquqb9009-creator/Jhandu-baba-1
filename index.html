        let currentQuestions = [];

        function getNewQuestions() {
            if (usedQuestions.length >= questionBank.length - 3) {
                usedQuestions = [];
            }
            const available = questionBank.filter(q => !usedQuestions.includes(q));
            const shuffled = available.sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 3);
            usedQuestions.push(...selected);
            return selected;
        }

        function loadNewQuestions() {
            currentQuestions = getNewQuestions();
            const qDiv = document.getElementById('questions');
            qDiv.innerHTML = '';
            currentQuestions.forEach((q, i) => {
                qDiv.innerHTML += `<label>Sawaal ${i+1}: ${q}</label><input type="text" id="q${i+1}" placeholder="e.g., 5 ya 'Bahut' likh sakte ho">`;
            });
            document.getElementById('stats').innerText = `${usedQuestions.length} Sawaal Pooche Gaye | ${questionBank.length} Total | 500 Mood | Har Baar Naya Roast`;
        }

        function parseAnswer(val) {
            if (!val) return 0;
            const num = parseInt(val.replace(/[^0-9]/g, ''));
            return isNaN(num) ? val.length * 10 : num;
        }

        function generateRoast() {
            const name = document.getElementById('name').value.trim() || 'Bhai';
            const q1Raw = document.getElementById('q1').value.trim();
            const q2Raw = document.getElementById('q2').value.trim();
            const q3Raw = document.getElementById('q3').value.trim();
            
            if (!name || q1Raw === '' || q2Raw === '' || q3Raw === '') {
                alert('Abe saare sawaal bhar pehle 💣');
                return;
            }
            
            const q1 = parseAnswer(q1Raw);
            const q2 = parseAnswer(q2Raw);
            const q3 = parseAnswer(q3Raw);
            
            const baseScore = (q1 * 10) + (q2 * 50) + (q3 * 100);
            const randomBoost = Math.floor(Math.random() * 5000);
            const score = baseScore + randomBoost;
            
            const moodIndex = Math.min(Math.floor(score / 100), 499);
            const moodInfo = moodData[moodIndex % moodData.length];
            
            const template = roastTemplates[Math.floor(Math.random() * roastTemplates.length)];
            const roast = template
                .replace(/{name}/g, name)
                .replace(/{score}/g, score)
                .replace(/{mood}/g, moodInfo.name)
                .replace(/{desc}/g, moodInfo.desc)
                .replace(/{q1}/g, q1Raw)
                .replace(/{q2}/g, q2Raw)
                .replace(/{q3}/g, q3Raw);
                
            document.getElementById('inputScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            document.getElementById('moodEmoji').innerText = moodInfo.emoji;
            document.getElementById('moodText').innerText = `${moodInfo.name} MODE`;
            document.getElementById('moodDesc').innerText = moodInfo.desc;
            document.getElementById('roastText').innerText = roast;
            
            window.scrollTo(0, 0);
        }

        function goBack() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('inputScreen').style.display = 'flex';
            resetQuestions();
        }

        function resetQuestions() {
            document.getElementById('name').value = '';
            loadNewQuestions();
            window.scrollTo(0, 0);
        }
        
        function copyRoast() {
            const mood = document.getElementById('moodText').innerText;
            const desc = document.getElementById('moodDesc').innerText;
            const text = document.getElementById('roastText').innerText;
            navigator.clipboard.writeText(`${mood}\n${desc}\n\n${text}\n\nTry karo: ${window.location.href}`);
            alert('Roast copy ho gaya! 🔥 Ab dosto ko bhej');
        }
        
        function shareWA() {
            const mood = document.getElementById('moodText').innerText;
            const desc = document.getElementById('moodDesc').innerText;
            const text = document.getElementById('roastText').innerText;
            const url = `https://wa.me/?text=${encodeURIComponent('💣 ' + mood + '\n' + desc + '\n\n' + text + '\n\nTry karo: ' + window.location.href)}`;
            window.open(url, '_blank');
        }

        // Page load hote hi sawaal load kar do
        window.onload = function() {
            loadNewQuestions();
        };
    </script>
</body>
</html>
